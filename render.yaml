services:
  # 1. Private Python ML Service (Hidden from public internet, talks only to Node)
  - type: pserv
    name: python-odds
    env: docker
    dockerfilePath: python-odds-service/Dockerfile
    rootDir: python-odds-service

  # 2. Public Node.js API Service
  - type: web
    name: sports-odds-backend
    env: docker
    dockerfilePath: backend/Dockerfile
    rootDir: backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sports_odds_db
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false # Render will ask you for this value on the dashboard

  # 3. Public React Frontend
  - type: web
    name: sports-odds-frontend
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    rootDir: frontend
    envVars:
      - key: VITE_API_URL
        sync: false # Render will ask you for the Backend URL on the dashboard

databases:
  # 4. PostgreSQL Database
  - name: sports_odds_db
    plan: free
