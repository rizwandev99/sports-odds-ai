services:
  # 1. Python ML Inference Service
  - type: web
    name: python-odds
    env: docker
    plan: free
    dockerfilePath: Dockerfile
    rootDir: python-odds-service

  # 2. Node.js API Service
  - type: web
    name: sports-odds-backend
    env: docker
    plan: free
    dockerfilePath: Dockerfile
    rootDir: backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sports_odds_db
          property: connectionString
      - key: PYTHON_ODDS_URL
        fromService:
          name: python-odds
          type: web
          property: host
      - key: GROQ_API_KEY
        sync: false

  # 3. React Frontend (Static Site - always free)
  - type: web
    name: sports-odds-frontend
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    rootDir: frontend
    envVars:
      - key: VITE_API_URL
        sync: false

databases:
  # 4. PostgreSQL Database (Free - expires in 30 days)
  - name: sports_odds_db
    plan: free
